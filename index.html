<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escalação - Canal Pokaz Ideia Alvinegro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* Estrutura Base */
        body {
            margin: 0; padding: 0; font-family: 'Arial', sans-serif;
            background-color: #121212; color: #fff;
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh;
        }

        /* Área Principal */
      .main { 
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; 
        }
        
      .export-btn {
            background: #ffffff; color: #000; font-weight: bold; text-transform: uppercase;
            padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; 
            margin-bottom: 20px; font-size: 16px; transition: transform 0.1s;
        }
      .export-btn:active { transform: scale(0.95); }

        /* O Campo Chumbo Customizado */
      .pitch-wrapper {
            width: 480px; height: 640px; position: relative;
            background-color: #212121; /* Chumbo Escuro */
            background-image: repeating-linear-gradient(0deg, transparent, transparent 10%, rgba(0,0,0,0.15) 10%, rgba(0,0,0,0.15) 20%);
            border: 4px solid #fff; border-radius: 8px; overflow: hidden;
        }

        /* Logomarca com Transparência */
      .pitch-wrapper::before {
            content: "";
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('logo.png'); /* Sua logo salva na mesma pasta */
            background-position: center center; 
            background-repeat: no-repeat; 
            background-size: 80%; /* Tamanho da Logo */
            opacity: 0.15; /* Transparência (0.15 = 15%) */
            z-index: 1; pointer-events: none; 
        }
        
        /* Linhas Internas Brancas do Campo */
      .line-center,.circle-center,.area-top,.area-bottom { position: absolute; z-index: 2; pointer-events: none;}
      .line-center { top: 50%; left: 0; right: 0; border-top: 3px solid #fff; transform: translateY(-50%); }
      .circle-center { top: 50%; left: 50%; width: 130px; height: 130px; border: 3px solid #fff; border-radius: 50%; transform: translate(-50%, -50%); }
      .area-top { top: 0; left: 50%; width: 220px; height: 100px; border: 3px solid #fff; border-top: none; transform: translateX(-50%); }
      .area-bottom { bottom: 0; left: 50%; width: 220px; height: 100px; border: 3px solid #fff; border-bottom: none; transform: translateX(-50%); }

        /* Grid Tático CSS */
      .tactical-grid {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            display: flex; flex-direction: column; justify-content: space-between; padding: 20px 0;
            z-index: 10;
        }
      .row { display: flex; justify-content: space-evenly; width: 100%; }
        
        /* Vagas (Slots) de cada Jogador */
      .slot {
            width: 80px; height: 80px; border: 2px dashed rgba(255,255,255,0.4);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(0,0,0,0.3); transition: background 0.2s;
            font-size: 24px;
        }
      .slot:hover { background: rgba(255,255,255,0.1); }
        
        /* Carta do Jogador inserida no campo */
      .player-in-pitch {
            width: 100%; height: 100%; border-radius: 50%;
            background: #000; border: 2px solid #fff; color: #fff;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; text-align: center; line-height: 1.2;
            padding: 5px; box-sizing: border-box;
        }
      .player-in-pitch.pos { color: #aaa; font-size: 9px; margin-top: 4px; }

        /* Janela Modal (A Lista de Jogadores Suspensa) */
      .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            align-items: center; justify-content: center;
        }
      .modal-content {
            background: #1a1a1a; border: 2px solid #444; border-radius: 8px;
            width: 350px; max-height: 80vh; display: flex; flex-direction: column;
        }
      .modal-header {
            padding: 15px; border-bottom: 2px solid #333; display: flex; justify-content: space-between;
            align-items: center; font-weight: bold;
        }
      .close-btn { background: #ff3333; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 4px; font-weight: bold;}
      .lista-jogadores { padding: 15px; overflow-y: auto; flex: 1; }
        
      .item-jogador {
            background: #2a2a2a; border: 1px solid #444; padding: 12px; margin-bottom: 8px;
            border-radius: 5px; cursor: pointer; display: flex; justify-content: space-between;
            font-size: 14px;
        }
      .item-jogador:hover { background: #3a3a3a; }
      .item-pos { color: #888; font-size: 12px; }
      .remover-btn {
            background: transparent; color: #ff5555; border: 1px solid #ff5555; width: 100%;
            padding: 10px; margin-bottom: 10px; cursor: pointer; border-radius: 5px; text-transform: uppercase; font-weight: bold; display: none;
        }
    </style>
</head>
<body>

<div class="main">
    <button class="export-btn" onclick="baixarImagem()">Salvar Escalação (PNG)</button>

    <div id="campo-tatico" class="pitch-wrapper">
        <div class="line-center"></div>
        <div class="circle-center"></div>
        <div class="area-top"></div>
        <div class="area-bottom"></div>

        <div class="tactical-grid">
            <div class="row">
                <div class="slot" onclick="abrirModal(this)">+</div>
            </div>
            <div class="row">
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
            </div>
            <div class="row">
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
            </div>
            <div class="row">
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
                <div class="slot" onclick="abrirModal(this)">+</div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>Selecione um Jogador</span>
            <button class="close-btn" onclick="fecharModal()">X</button>
        </div>
        <div class="lista-jogadores" id="lista-jogadores">
            <button class="remover-btn" id="btn-limpar" onclick="limparSlot()">Remover Jogador</button>
        </div>
    </div>
</div>

<script>
    // Inventário Completo Corinthians Profissional Masculino
    const elenco =;

    let slotAtivo = null;
    const modal = document.getElementById('modal');
    const containerLista = document.getElementById('lista-jogadores');
    const btnLimpar = document.getElementById('btn-limpar');

    // Popula a lista do Modal assim que o site carrega
    elenco.forEach(jogador => {
        const item = document.createElement('div');
        item.className = 'item-jogador';
        item.innerHTML = `<strong>${jogador.nome}</strong> <span class="item-pos">${jogador.pos}</span>`;
        item.onclick = () => selecionarJogador(jogador);
        containerLista.appendChild(item);
    });

    // Função para Abrir a Janela
    function abrirModal(slotClicado) {
        slotAtivo = slotClicado;
        // Se o slot já tem jogador, mostrar o botão de remover
        if(slotAtivo.innerHTML!== '+') {
            btnLimpar.style.display = 'block';
        } else {
            btnLimpar.style.display = 'none';
        }
        modal.style.display = 'flex';
    }

    // Fechar Janela
    function fecharModal() {
        modal.style.display = 'none';
    }

    // Aplicar a escolha no campo
    function selecionarJogador(jogador) {
        if(slotAtivo) {
            slotAtivo.innerHTML = `
                <div class="player-in-pitch">
                    <span>${jogador.nome}</span>
                    <span class="pos">${jogador.pos}</span>
                </div>
            `;
            // Remove a borda pontilhada quando preenchido para ficar mais limpo
            slotAtivo.style.border = 'none';
        }
        fecharModal();
    }

    // Limpar posição do campo
    function limparSlot() {
        if(slotAtivo) {
            slotAtivo.innerHTML = '+';
            slotAtivo.style.border = '2px dashed rgba(255,255,255,0.4)';
        }
        fecharModal();
    }

    // Transformar em Imagem para Salvar
    function baixarImagem() {
        const campo = document.getElementById('campo-tatico');
        html2canvas(campo, {
            useCORS: true,
            scale: 2, 
            backgroundColor: '#212121'
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'escalacao-pokaz-ideia.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }
</script>
</body>
</html>
